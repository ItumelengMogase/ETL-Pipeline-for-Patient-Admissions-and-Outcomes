version: '3.8'

services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: itumeleng
      POSTGRES_PASSWORD: libra
      POSTGRES_DB: healthcare_pipeline_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "itumeleng"]
      interval: 10s
      timeout: 5s
      retries: 5

  webserver:
    image: apache/airflow:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://itumeleng:libra@postgres:5432/healthcare_pipeline_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - C:/Users/Itumeleng/DEProjects/airflow/data:/opt/airflow/data  # <-- Volume mapping for your local data directory
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    command: >
      bash -c "airflow db init &&
               airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@example.com --password admin &&
               airflow webserver"

  scheduler:
    image: apache/airflow:latest
    depends_on:
      - webserver
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://itumeleng:libra@postgres:5432/healthcare_pipeline_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    command: airflow scheduler

  dbt:
    image: ghcr.io/dbt-labs/dbt-core:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DBT_PROJECT_DIR=/usr/app/dbt
    volumes:
      - C:/Users/Itumeleng/DEProjects/ETL Pipeline for Patient Admissions and Outcomes/dbt:/usr/app/dbt  # Correct volume mapping for dbt project folder
    ports:
      - "8081:8080"
  
volumes:
  postgres-db-volume:
